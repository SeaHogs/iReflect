
services:
  ## entry point for ireflect app containers
  app-reverse-proxy:
    image: szelongq/ireflect-reverse-proxy
    build:
      context: ./app-reverse-proxy
    volumes:
      - static-volume:/app/static
    networks:
      - frontend
      - backend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

  ## can only be accessed within frontend network
  frontend:
    image: szelongq/ireflect-frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
        # REACT_APP_GOOGLE_CLIENT_ID: 858509158388-d943lj9isgh7oaumkoj65kqvq1ehgt14.apps.googleusercontent.com
        # REACT_APP_FACEBOOK_APP_ID: 2976187512667349
        NEXT_PUBLIC_SITE_URL: http://localhost
    networks:
      - frontend
    restart: always

  ## can only be accessed within backend network
  backend:
    image: szelongq/ireflect-backend
    build:
      context: ./backend
    command: sh -c "cd pigeonhole && gunicorn pigeonhole.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static-volume:/app/static
    networks:
      - backend
    restart: always
    env_file:
      - ./backend/.env.backend.development.local
    depends_on:
      - db

  lightrag:
    image: newtonkoh/lightrag:latest
    ports:
      - "9621:9621"
    networks:
      - backend  # or whichever network it should be connected to
    restart: always
    environment:
      HOST: ${LIGHTRAG_HOST:-0.0.0.0}
      PORT: ${LIGHTRAG_PORT:-9621}
      NAMESPACE_PREFIX: ${LIGHTRAG_NAMESPACE_PREFIX:-lightrag}
      CORS_ORIGINS: ${LIGHTRAG_CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      LOG_LEVEL: ${LIGHTRAG_LOG_LEVEL:-INFO}
      VERBOSE: ${LIGHTRAG_VERBOSE:-False}
      TIMEOUT: ${LIGHTRAG_TIMEOUT:-300}
      MAX_ASYNC: ${LIGHTRAG_MAX_ASYNC:-4}
      EMBEDDING_DIM: ${LIGHTRAG_EMBEDDING_DIM:-1024}
      MAX_EMBED_TOKENS: ${LIGHTRAG_MAX_EMBED_TOKENS:-8192}
      HISTORY_TURNS: ${LIGHTRAG_HISTORY_TURNS:-3}
      COSINE_THRESHOLD: ${LIGHTRAG_COSINE_THRESHOLD:-0.2}
      TOP_K: ${LIGHTRAG_TOP_K:-60}
      MAX_TOKEN_TEXT_CHUNK: ${LIGHTRAG_MAX_TOKEN_TEXT_CHUNK:-4000}
      MAX_TOKEN_RELATION_DESC: ${LIGHTRAG_MAX_TOKEN_RELATION_DESC:-4000}
      MAX_TOKEN_ENTITY_DESC: ${LIGHTRAG_MAX_TOKEN_ENTITY_DESC:-4000}
      CHUNK_SIZE: ${LIGHTRAG_CHUNK_SIZE:-1200}
      CHUNK_OVERLAP_SIZE: ${LIGHTRAG_CHUNK_OVERLAP_SIZE:-100}
      MAX_TOKENS: ${LIGHTRAG_MAX_TOKENS:-32768}
      MAX_TOKEN_SUMMARY: ${LIGHTRAG_MAX_TOKEN_SUMMARY:-500}
      SUMMARY_LANGUAGE: ${LIGHTRAG_SUMMARY_LANGUAGE:-English}
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
      LLM_BINDING: ${LIGHTRAG_LLM_BINDING:-openai}
      LLM_BINDING_HOST: ${LIGHTRAG_LLM_BINDING_HOST:-https://api.openai.com}
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_BINDING: ${LIGHTRAG_EMBEDDING_BINDING:-openai}
      EMBEDDING_BINDING_HOST: ${LIGHTRAG_EMBEDDING_BINDING_HOST:-https://api.openai.com}
      EMBEDDING_MODEL: ${LIGHTRAG_EMBEDDING_MODEL:-text-embedding-3-large}
      OPENAI_API_KEY: ${LIGHTRAG_OPENAI_API_KEY:?LIGHTRAG_OPENAI_API_KEY must be set}
      LLM_BINDING_API_KEY: ${LIGHTRAG_OPENAI_API_KEY:?LIGHTRAG_OPENAI_API_KEY must be set}

  ## can only be accessed within backend network
  db:
    image: postgres:13-alpine
    networks:
      - backend
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    env_file:
      - ./backend/.env.db.development.local
    restart: always


networks:
  frontend:
  backend:

volumes:
  postgres-data:
  static-volume:
